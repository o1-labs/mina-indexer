# Run the Rust test suite on pull requests, in the project's Nix dev shell
# (the canonical build environment: clang + mold + libclang).
name: Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
      - name: Nix build cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Run tests
        run: |
          export GIT_COMMIT_HASH="$(git rev-parse --short=8 HEAD || echo unknown)"
          nix develop --command bash -c 'cd rust && cargo nextest run --release'
